server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  port: 8010
  servlet:
    session:
      cookie:
        http-only: true
    context-path: /auth

spring:
  application:
    name: mall-auth
  profiles:
    active: dev
  messages:
    encoding: UTF-8
    basename: i18n/message
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

logging:
  config: classpath:logback-blog.xml

sa-token:
  token-name: satoken
  # token 存活时间（秒），-1 永久
  timeout: 2592000
  # token 最低活跃频率（秒）,超过指定时间冻结 token
  active-timeout: -1
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: true
  token-style: uuid
  is-log: true
