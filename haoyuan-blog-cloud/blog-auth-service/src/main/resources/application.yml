server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  port: 8100
  servlet:
    session:
      cookie:
        http-only: true
    context-path: /auth

spring:
  application:
    name: blog-auth
  profiles:
    active: dev
  messages:
    encoding: UTF-8
    basename: i18n/message
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.limyel.haoyuan.blog.*.entity
  global-config:
    #数据库相关配置
    db-config:
      id-type: auto
      logic-delete-value: NOW()
      logic-not-delete-value: 'NULL'
    banner: false
  #原生配置
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'NULL'
  #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  configuration-properties:
    prefix:
    blobType: BLOB
    boolValue: TRUE

sa-token:
  # token 名称
  token-name: satoken
  # token 有效期（秒）
  timeout: 2592000
  active-timeout: -1
  # 允许多地同时登录
  is-concurrent: true
  # 多人登录同一账号时，共用一个 token
  is-share: true
  token-style: uuid
  is-log: true


logging:
  config: classpath:logback-blog.xml