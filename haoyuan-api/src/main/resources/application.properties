server.port=8000

spring.application.name=blog
spring.profiles.active=dev
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER


##### 数据库 #####
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.url=jdbc:mysql://localhost:3306/haoyuan?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
### druid ###
spring.datasource.druid.driver-class-name=com.mysql.cj.jdbc.Driver
# 初始化大小，最小，最大
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
# 获取连接等待超时的时间
spring.datasource.druid.max-wait=60000
## druid 监控
# 开启监控页面
spring.datasource.druid.stat-view-servlet.enabled=true
# 监控系统用户名，密码
spring.datasource.druid.stat-view-servlet.login-username=druid
spring.datasource.druid.stat-view-servlet.login-password=123456
# 是否允许清空监控数据
spring.datasource.druid.stat-view-servlet.reset-enable=false
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
# 白名单
spring.datasource.druid.stat-view-servlet.allow=127.0.0.1
# 黑名单
#spring.datasource.druid.stat-view-servlet.deny=
# 配置扩展插件，常用的插件有：监控统计用的 stat，日志用的 slf4j，防御 sql 注入的 wall
spring.datasource.druid.filters=stat,wall,slf4j
# 用来打开 SQL 参数化合并监控和慢 SQL 记录
spring.datasource.druid.connectionProperties=druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
# 合并多个 DruidDataSource 的监控数据
spring.datasource.druid.useGlobalDataSourceStat=true
# 开启 web 监控（Web应用、URI监控、Session监控）
spring.datasource.druid.web-stat-filter.enabled=true
# 需要监控的路径
spring.datasource.druid.web-stat-filter.url-pattern=/*
# 不监控静态文件和监控系统自己的请求
spring.datasource.druid.web-stat-filter.exclusions=*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*
# 统计请求调用链
spring.datasource.druid.web-stat-filter.profile-enable=true
# 开启 Spring 监控
spring.datasource.druid.aop-patterns=com.limyel.blog.controller.*,com.limyel.blog.service.*,com.limyel.blog.dao.*
# 日志配置
spring.datasource.druid.filter.slf4j.enabled=true
spring.datasource.druid.filter.slf4j.statement-executable-sql-log-enable=true
